<script>
const statusEl = document.getElementById('status');
const nextEl = document.getElementById('next');
const timeEl = document.getElementById('time');

timeEl.textContent = 'Time: ' + new Date().toLocaleTimeString();

// 5 second timeout so it doesn’t hang forever
const controller = new AbortController();
const timeoutId = setTimeout(() => controller.abort(), 5000);

fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.citypower.co.za/schedule/v2?area=johannesburg-central'), {
  signal: controller.signal
})
.then(response => response.json())
.then(data => {
    clearTimeout(timeoutId);
    const actualData = JSON.parse(data.contents);
    if (actualData && actualData.schedule && actualData.schedule.length > 0) {
      statusEl.textContent = '✅ POWER ON';
      statusEl.className = 'status-on';
      const next = actualData.schedule[0];
      nextEl.textContent = `Next outage: ${next.start} - ${next.end}`;
    } else {
      statusEl.textContent = '⚠️ POWER OFF';
      statusEl.className = 'status-off'; 
      nextEl.textContent = 'No schedule data available';
    }
})
.catch(error => {
    clearTimeout(timeoutId);
    // FALLBACK TEST DATA so you can see the page working
    statusEl.textContent = '⚠️ TEST MODE';
    statusEl.className = 'status-off';
    nextEl.textContent = 'API failed: ' + error.message + ' - Showing test data';
});
</script>
</body>
</html>
